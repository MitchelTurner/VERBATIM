name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest

      - name: Run tests
        env:
          DATABASE_URL: sqlite+pysqlite:///:memory:
        run: pytest -q

      - name: Build frontend
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: |
          cd frontend
          npm ci
          npm run build
