services:
  - type: web
    name: ytdb-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ytdb-db
          property: connectionString
      - key: DB_WAIT
        value: "false"

databases:
  - name: ytdb-db
    plan: free
